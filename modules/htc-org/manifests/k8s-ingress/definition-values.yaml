ingressClassName: nginx-internal
pathType: ImplementationSpecific
host: ${resources.dns.outputs.host}
routePaths: ${resources.dns<route.outputs.path}
routePorts: ${resources.dns<route.outputs.port}
routeServices: ${resources.dns<route.outputs.service}
annotations: ${resources['config#ingress'].outputs.annotations}
ingressTimeout: ${resources['ingress>dns<workload.default'].outputs.ingressTimeout}
# labels: {}
templates:
  manifests: |
    {{- if gt (len .driver.values.routePaths) 0 -}}
    ingress.yaml:
      location: namespace
      data:
        apiVersion: networking.k8s.io/v1
        kind: Ingress
        metadata:
          {{- if and (ne .driver.values.class "default") (ne .driver.values.class "internal") }}
          annotations:
            {{- range $k, $v := .driver.values.annotations }}
            {{ $k }}: {{ $v | toRawJson }}
            {{- end }}
            {{- if ne (.driver.values.ingressTimeout | first) "no-value" }}
            ingress-timeout: {{ .driver.values.ingressTimeout | first | toRawJson }}
            {{- end}}
          {{- end}}
          {{- if hasKey .driver.values "labels" }}
          labels: {{ .driver.values.labels | toRawJson }}
          {{- end}}
          name: {{ .id }}-ingress
        spec:
          {{- if .driver.values.ingressClassName }}
          ingressClassName: {{ .driver.values.ingressClassName | toRawJson }}
          {{- end }}
          rules:
          - host: {{ .driver.values.host | toRawJson }}
            http:
              paths:
              {{- range $index, $path := .driver.values.routePaths }}
              - path: {{ $path | toRawJson }}
                pathType: {{ $.driver.values.pathType | default "Prefix" | toRawJson }}
                backend:
                  service:
                    name: {{ index $.driver.values.routeServices $index | toRawJson }}
                    port:
                      number: {{ index $.driver.values.routePorts $index }}
              {{- end }}
    {{- end -}}
  outputs: |
    id: {{ .id }}-ingress
